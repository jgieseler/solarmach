# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: pytest

on:
  push:
    # branches: [ "main" ]
  pull_request:
    # branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install ruff
      run: |
        uv venv .venv
        source .venv/bin/activate
        uv pip install ruff
    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        # stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --exclude=.venv
        # summary
        ruff check . --select=E,F,C90 --ignore=E501 --exclude=.venv --statistics --quiet --exit-zero
        # exit-zero treats all errors as warnings
        ruff check . --select=E,F,C90 --ignore=E501 --exclude=.venv --exit-zero

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        uv venv .venv --python ${{ matrix.python-version }}
        source .venv/bin/activate
        uv pip install pytest pytest-doctestplus pytest-cov pytest-mpl
        # uv pip install -r requirements.txt
        uv pip install .
    - name: Test with pytest
      run: |
        source .venv/bin/activate
        pytest -ra --mpl --mpl-baseline-path=baseline --mpl-baseline-relative --mpl-generate-summary=html --mpl-results-path='/home/runner/work/solarmach/solarmach/report/' --cov .
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    - name: Save PFSS plot as artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.python-version }}-pfss-plot-artifact
        path: "/home/runner/work/solarmach/solarmach/tmp_solarmach_pfss.png"
    - name: Save standard plot as artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.python-version }}-standard-plot-artifact
        path: "/home/runner/work/solarmach/solarmach/tmp_solarmach.png"
    - name: Save pytest-mpl report as artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.python-version }}-pytest-mpl-report-artifact
        path: "/home/runner/work/solarmach/solarmach/report/"

  test-wheel:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Build wheel
      run: |
        uv venv .venv --python ${{ matrix.python-version }}
        source .venv/bin/activate
        uv pip install build
        python -m build
    - name: Install from wheel
      run: |
        source .venv/bin/activate
        uv pip install pytest pytest-doctestplus pytest-cov pytest-mpl
        uv pip install dist/solarmach-*.whl
    - name: Test with pytest
      run: |
        source .venv/bin/activate
        mv solarmach solarmach_src
        pytest -ra --mpl --mpl-baseline-path=solarmach_src/tests/baseline --mpl-baseline-relative --mpl-generate-summary=html --mpl-results-path='/home/runner/work/solarmach/solarmach/report/' solarmach_src/tests/
    - name: Save pytest-mpl report as artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.python-version }}-wheel-pytest-mpl-report-artifact
        path: "/home/runner/work/solarmach/solarmach/report/"